services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  api:
    build: .
    command: api
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - rabbitmq

  worker:
    build: .
    command: worker
    env_file:
      - .env
    depends_on:
      - rabbitmq
